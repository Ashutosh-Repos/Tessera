version: '3.8'

services:
  redis:
    image: redis:7.0
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
      - "16379:16379"

  nats:
    image: nats:2.9
    command: -js -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"

  etcd:
    image: gcr.io/etcd-development/etcd:v3.5.9
    ports:
      - "2379:2379"
      - "2380:2380"
    command: >
      /usr/local/bin/etcd
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://0.0.0.0:2379

  minio:
    image: minio/minio:RELEASE.2023-08-09T23-30-22Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data

  create-bucket:
    image: minio/mc
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio http://minio:9000 minioadmin minioadmin;
      mc mb myminio/transcoder;
      mc anonymous set public myminio/transcoder;
      echo '{\"CORSRules\":[{\"AllowedOrigins\":[\"*\"],\"AllowedMethods\":[\"GET\",\"PUT\",\"POST\",\"HEAD\"],\"AllowedHeaders\":[\"*\"],\"ExposeHeaders\":[\"ETag\"]}]}' > /tmp/cors.json;
      mc cors set myminio/transcoder /tmp/cors.json;
      exit 0;
      "

volumes:
  minio_data:
