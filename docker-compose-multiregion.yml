version: '3.8'

services:
  # ==========================================
  # US-EAST INFRASTRUCTURE
  # ==========================================
  redis-us-east:
    image: redis:7.0
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"

  nats-us-east:
    image: nats:2.9
    command: -js -m 8222
    ports:
      - "4222:4222"
      - "8222:8222"

  etcd-us-east:
    image: gcr.io/etcd-development/etcd:v3.5.9
    ports:
      - "2379:2379"
    command: >
      /usr/local/bin/etcd
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://0.0.0.0:2379

  minio-us-east:
    image: minio/minio:RELEASE.2023-08-09T23-30-22Z
    command: server /data --console-address ":9001"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data_us_east:/data

  # ==========================================
  # EU-WEST INFRASTRUCTURE
  # ==========================================
  redis-eu-west:
    image: redis:7.0
    command: redis-server --appendonly yes
    ports:
      - "6389:6379"

  nats-eu-west:
    image: nats:2.9
    command: -js -m 8232
    ports:
      - "4232:4222"
      - "8232:8222"

  etcd-eu-west:
    image: gcr.io/etcd-development/etcd:v3.5.9
    ports:
      - "2389:2379"
    command: >
      /usr/local/bin/etcd
      --listen-client-urls=http://0.0.0.0:2379
      --advertise-client-urls=http://0.0.0.0:2379

  minio-eu-west:
    image: minio/minio:RELEASE.2023-08-09T23-30-22Z
    command: server /data --console-address ":9011"
    environment:
      - MINIO_ROOT_USER=minioadmin
      - MINIO_ROOT_PASSWORD=minioadmin
    ports:
      - "9010:9000"
      - "9011:9011"
    volumes:
      - minio_data_eu_west:/data

  # ==========================================
  # AUTO-BUCKET INITIALIZATION
  # ==========================================
  create-buckets:
    image: minio/mc
    depends_on:
      - minio-us-east
      - minio-eu-west
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      mc alias set myminio-us http://minio-us-east:9000 minioadmin minioadmin;
      mc alias set myminio-eu http://minio-eu-west:9000 minioadmin minioadmin;
      mc mb myminio-us/transcoder-us-east;
      mc mb myminio-eu/transcoder-eu-west;
      mc anonymous set public myminio-us/transcoder-us-east;
      mc anonymous set public myminio-eu/transcoder-eu-west;
      exit 0;
      "

volumes:
  minio_data_us_east:
  minio_data_eu_west:
