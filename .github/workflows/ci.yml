name: Continuous Integration

on:
  push:
    branches: [ main, version-2 ]
  pull_request:
    branches: [ main, version-2 ]

jobs:
  go-backend:
    name: Go Engine Build & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24.x'
          cache: true

      - name: Verify Dependencies
        run: go mod verify

      - name: Go Vet
        run: go vet ./...

      - name: Run Go Tests
        run: go test -v -race ./...

      - name: Build Binary
        run: go build -v -o transcoder-bin ./cmd/transcoder/main.go

  frontend-sdk:
    name: Frontend components & SDK Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'

      - name: Build UI SDK Package
        run: |
          cd ui-sdk
          npm ci
          npm run build

      - name: Build Admin Console
        run: |
          cd admin-console
          npm ci
          npm run build

      - name: Build Developer Portal
        run: |
          cd developer-portal
          npm ci
          npm run build
